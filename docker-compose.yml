services:
  app:
    image: optivoy-backend:prod
    container_name: optivoy-backend
    restart: unless-stopped
    env_file:
      - /opt/optivoy/env/.env
    ports:
      - '127.0.0.1:3000:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
