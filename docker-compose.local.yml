services:
  postgres:
    image: postgres:15-alpine
    container_name: optivoy-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: optivoy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - optivoy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d optivoy']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: optivoy-redis-local
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - optivoy_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.11.0
    container_name: optivoy-jaeger-local
    restart: unless-stopped
    ports:
      - '16686:16686'
      - '4317:4317'
      - '4318:4318'

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.122.1
    container_name: optivoy-otel-collector-local
    restart: unless-stopped
    command: ['--config=/etc/otelcol-contrib/config.yaml']
    depends_on:
      - jaeger
    ports:
      - '9464:9464'
    volumes:
      - ./observability/local/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: optivoy-prometheus-local
    restart: unless-stopped
    depends_on:
      - otel-collector
    ports:
      - '9090:9090'
    volumes:
      - ./observability/local/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.5.2
    container_name: optivoy-grafana-local
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./observability/local/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/local/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/local/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - optivoy_grafana_data:/var/lib/grafana

volumes:
  optivoy_postgres_data:
  optivoy_redis_data:
  optivoy_grafana_data:
